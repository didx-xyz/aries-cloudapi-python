    /admin/wallet-multitenant/create-wallet:
      post:
        tags:
        - 'Admin: Wallets'
        summary: Create Subwallet
        description: "Create a new wallet\n\nParameters:\n-----------\nwallet_payload:\
          \ CreateWalletRequest\n    The payload for creating the wallet\n\n\nReturns:\n\
          --------\nThe response object from creating a wallet on the ledger\n\nExample\
          \ Request Body:\n{\n        \"image_url\": \"https://aries.ca/images/sample.png\"\
          ,\n        \"key_management_mode\": \"managed\",\n        \"label\": \"YOMA\"\
          ,\n        \"wallet_dispatch_type\": \"default\",\n        \"wallet_key\"\
          : \"MySecretKey1234\",\n        \"wallet_name\": \"YOMAsWallet\",\n      \
          \  \"wallet_type\": \"indy\"\n    }"
        operationId: create_subwallet_admin_wallet_multitenant_create_wallet_post
        parameters:
        - required: false
          schema:
            title: X-Api-Key
            type: string
          name: x-api-key
          in: header
        - required: false
          schema:
            title: Authorization
            type: string
